# [ruff]
line-length = 120
format.quote-style = "single"

# Enable Pyflakes `E` and `F` codes by default.
lint.select = ["E", "F", "I"]
lint.ignore = []

# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".ruff_cache",
    ".svn",
    ".tox",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    ".env",
    ".venv",
    "venv",
    "typings/**/*.pyi",
]
lint.per-file-ignores = { }

# Allow unused variables when underscore-prefixed.
# dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# Match the package's minimum supported Python (requires-python >=3.9) so Ruff never
# rewrites code into newer-only idioms (e.g. `Dict[...]` -> `dict | None`) that would
# break at runtime on 3.9.
target-version = "py39"

#[tool.ruff.mccabe]
## Unlike Flake8, default to a complexity level of 10.
lint.mccabe.max-complexity = 10
